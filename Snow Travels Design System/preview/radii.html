<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;color:#fff}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:80px;height:56px;background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.12)}
  .nm{font-size:11px;font-weight:600;color:#fff}
  .px{font-size:10px;color:rgba(255,255,255,0.4);font-variant-numeric:tabular-nums}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="box" style="border-radius:6px"></div><div class="nm">r-1 / r-2</div><div class="px">6 · 7px</div></div>
  <div class="cell"><div class="box" style="border-radius:8px"></div><div class="nm">r-3</div><div class="px">8px</div></div>
  <div class="cell"><div class="box" style="border-radius:10px"></div><div class="nm">r-4</div><div class="px">10px</div></div>
  <div class="cell"><div class="box" style="border-radius:12px"></div><div class="nm">r-5</div><div class="px">12px</div></div>
  <div class="cell"><div class="box" style="border-radius:30px"></div><div class="nm">r-pill</div><div class="px">30px full</div></div>
</div>
</body></html>
