<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:0;color:#fff}
  .strip{background:#080f09;border-top:0.5px solid rgba(255,255,255,0.06);border-bottom:0.5px solid rgba(255,255,255,0.06);padding:18px 24px}
  .inner{display:flex;align-items:center;justify-content:center;gap:32px;flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;gap:10px;line-height:1;color:#fff}
  .wm{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;letter-spacing:-0.3px;color:#fff;line-height:1}
  .wm-goog{font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:500;letter-spacing:-0.3px;line-height:1}
  .wm-goog .b{color:#4285F4}.wm-goog .r{color:#EA4335}.wm-goog .y{color:#FBBC05}.wm-goog .g{color:#34A853}
  .count{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.2px;white-space:nowrap;margin-left:2px}
  .divider{width:1px;height:22px;background:rgba(255,255,255,0.08)}
  .rn{background:#c8102e;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:12px}
  .rn-t{font-size:13px;font-weight:600;color:#fff;margin-bottom:2px}
  .rn-s{font-size:11px;color:rgba(255,255,255,0.75)}
  .rn-code{font-size:16px;font-weight:800;letter-spacing:3px;color:#fff;padding:6px 12px;background:rgba(0,0,0,0.25);border-radius:6px}
  svg{display:block;flex-shrink:0}
  .gyg-tile{width:22px;height:22px;border-radius:5px;background:#ff5533;display:flex;align-items:center;justify-content:center;font-family:Arial,Helvetica,sans-serif;font-size:11px;font-weight:900;color:#fff;letter-spacing:-0.3px}
</style></head><body>
<div class="strip">
  <div class="inner">

    <!-- GetYourGuide: orange rounded-square GYG tile + wordmark -->
    <span class="badge" aria-label="GetYourGuide">
      <span class="gyg-tile">GYG</span>
      <span class="wm">getyourguide</span>
      <span class="count">1,780+</span>
    </span>

    <span class="divider"></span>

    <!-- Google: 'G' mark + rainbow wordmark -->
    <span class="badge" aria-label="Google reviews">
      <svg height="20" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M21.6 12.23c0-.68-.06-1.33-.17-1.96H12v3.71h5.38c-.23 1.26-.94 2.33-2 3.05v2.54h3.24c1.89-1.74 2.98-4.3 2.98-7.34z" fill="#4285F4"/>
        <path d="M12 22c2.7 0 4.97-.9 6.62-2.43l-3.24-2.54c-.9.6-2.04.96-3.38.96-2.6 0-4.8-1.76-5.59-4.12H3.06v2.62A9.99 9.99 0 0 0 12 22z" fill="#34A853"/>
        <path d="M6.41 13.87a6.02 6.02 0 0 1 0-3.75V7.5H3.06a9.98 9.98 0 0 0 0 9l3.35-2.63z" fill="#FBBC05"/>
        <path d="M12 5.88c1.47 0 2.79.5 3.82 1.5l2.87-2.87C16.96 2.9 14.7 2 12 2a9.99 9.99 0 0 0-8.94 5.5l3.35 2.62C7.2 7.64 9.4 5.88 12 5.88z" fill="#EA4335"/>
      </svg>
      <span class="wm-goog"><span class="b">G</span><span class="r">o</span><span class="y">o</span><span class="b">g</span><span class="g">l</span><span class="r">e</span></span>
      <span class="count">5-star</span>
    </span>

    <span class="divider"></span>

    <!-- Tripadvisor: owl mark + wordmark -->
    <span class="badge" aria-label="Tripadvisor">
      <svg height="22" viewBox="0 0 40 22" aria-hidden="true">
        <ellipse cx="20" cy="11" rx="19" ry="10" fill="none" stroke="#34E0A1" stroke-width="1.3"/>
        <circle cx="12" cy="11" r="6" fill="none" stroke="#34E0A1" stroke-width="1.3"/>
        <circle cx="12" cy="11" r="2.5" fill="#34E0A1"/>
        <circle cx="11.3" cy="10.3" r="0.7" fill="#0b0b0b"/>
        <circle cx="28" cy="11" r="6" fill="none" stroke="#34E0A1" stroke-width="1.3"/>
        <circle cx="28" cy="11" r="2.5" fill="#34E0A1"/>
        <circle cx="27.3" cy="10.3" r="0.7" fill="#0b0b0b"/>
        <path d="M18.5 14 L20 16 L21.5 14 Z" fill="#34E0A1"/>
      </svg>
      <span class="wm">Tripadvisor</span>
      <span class="count">★★★★★</span>
    </span>

  </div>
</div>

<div class="rn">
  <div>
    <div class="rn-t"><span style="font-size:18px">🇨🇳</span> Most trusted RedNote partner in Tromsø · 官方认证</div>
    <div class="rn-s">Follow us on 小红书 for aurora updates &amp; tips</div>
  </div>
  <span class="rn-code">小红书</span>
</div>
</body></html>
