<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;color:#fff}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;align-items:end}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{background:#4ade80;border-radius:3px}
  .nm{font-size:11px;font-weight:600;color:#fff}
  .px{font-size:10px;color:rgba(255,255,255,0.4);font-variant-numeric:tabular-nums}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="box" style="width:4px;height:4px"></div><div class="nm">s-1</div><div class="px">4</div></div>
  <div class="cell"><div class="box" style="width:8px;height:8px"></div><div class="nm">s-2</div><div class="px">8</div></div>
  <div class="cell"><div class="box" style="width:12px;height:12px"></div><div class="nm">s-3</div><div class="px">12</div></div>
  <div class="cell"><div class="box" style="width:16px;height:16px"></div><div class="nm">s-4</div><div class="px">16</div></div>
  <div class="cell"><div class="box" style="width:24px;height:24px"></div><div class="nm">s-5</div><div class="px">24</div></div>
  <div class="cell"><div class="box" style="width:32px;height:32px"></div><div class="nm">s-6</div><div class="px">32</div></div>
  <div class="cell"><div class="box" style="width:40px;height:40px"></div><div class="nm">s-7</div><div class="px">40</div></div>
  <div class="cell"><div class="box" style="width:48px;height:48px"></div><div class="nm">s-8</div><div class="px">48</div></div>
  <div class="cell"><div class="box" style="width:64px;height:64px"></div><div class="nm">s-10</div><div class="px">64</div></div>
  <div class="cell"><div class="box" style="width:80px;height:80px"></div><div class="nm">s-12</div><div class="px">80</div></div>
  <div class="cell"><div class="box" style="width:96px;height:96px"></div><div class="nm">s-14</div><div class="px">96</div></div>
</div>
</body></html>
