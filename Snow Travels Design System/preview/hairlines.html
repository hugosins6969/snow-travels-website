<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;color:#fff}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:100%;aspect-ratio:5/3;background:rgba(255,255,255,0.03)}
  .nm{font-size:11px;font-weight:600}
  .meta{font-size:10px;color:rgba(255,255,255,0.4);font-variant-numeric:tabular-nums}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="box" style="border:0.5px solid rgba(255,255,255,0.06)"></div><div class="nm">06</div><div class="meta">separators</div></div>
  <div class="cell"><div class="box" style="border:0.5px solid rgba(255,255,255,0.08)"></div><div class="nm">08</div><div class="meta">cards · default</div></div>
  <div class="cell"><div class="box" style="border:0.5px solid rgba(255,255,255,0.10)"></div><div class="nm">10</div><div class="meta">hero stats</div></div>
  <div class="cell"><div class="box" style="border:0.5px solid rgba(255,255,255,0.12)"></div><div class="nm">12</div><div class="meta">dropdown · tabs</div></div>
  <div class="cell"><div class="box" style="border:0.5px solid rgba(255,255,255,0.15)"></div><div class="nm">15</div><div class="meta">lang-btn</div></div>
</div>
</body></html>
