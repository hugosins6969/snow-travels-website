<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;color:#fff}
  .logo{font-family:var(--font-display);font-weight:600;letter-spacing:0.5px;display:flex;align-items:baseline;gap:8px}
  .logo span{color:#4ade80}
  .row{display:flex;flex-direction:column;gap:18px}
  .ent{display:flex;align-items:center;gap:28px}
  .meta{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:0.8px;margin-left:auto}
</style></head><body>
<div class="row">
  <div class="ent">
    <div class="logo" style="font-size:28px">❄ Snow <span>Travels</span></div>
    <span class="meta">Primary wordmark · 28px</span>
  </div>
  <div class="ent">
    <div class="logo" style="font-size:20px">❄ Snow <span>Travels</span></div>
    <span class="meta">Nav wordmark · 20px</span>
  </div>
  <div class="ent">
    <img src="../assets/snow-travels-logo.svg" alt="" style="height:36px"/>
    <span class="meta">SVG export · 36px</span>
  </div>
</div>
</body></html>
