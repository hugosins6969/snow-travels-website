<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;color:#fff}
  .row{display:flex;flex-wrap:wrap;gap:12px}
  .ic{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#080f09;border:0.5px solid rgba(255,255,255,0.08);border-radius:8px;min-width:140px}
  .dd-icon{font-size:18px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.06);border-radius:8px;flex-shrink:0}
  .lbl{font-size:12px;color:rgba(255,255,255,0.7);font-weight:500}
  .h{font-size:11px;color:rgba(255,255,255,0.35);margin:16px 0 10px;letter-spacing:1px;text-transform:uppercase;font-weight:600}
  .arrows{display:flex;gap:12px;font-size:22px;color:#4ade80}
  .arrows span{color:rgba(255,255,255,0.5)}
</style></head><body>
<div class="h">Nav dropdown icons (emoji)</div>
<div class="row">
  <div class="ic"><span class="dd-icon">🌌</span><span class="lbl">Northern Lights</span></div>
  <div class="ic"><span class="dd-icon">☀️</span><span class="lbl">Day Tours</span></div>
  <div class="ic"><span class="dd-icon">🐋</span><span class="lbl">Whale Safari</span></div>
  <div class="ic"><span class="dd-icon">🦌</span><span class="lbl">Reindeer</span></div>
  <div class="ic"><span class="dd-icon">🐕</span><span class="lbl">Husky</span></div>
</div>
<div class="h">Unicode UI glyphs</div>
<div class="arrows">
  →&nbsp;<span>↓</span>&nbsp;<span>▾</span>&nbsp;<span>‹</span>&nbsp;<span>›</span>&nbsp;<span>+</span>&nbsp;<span>−</span>&nbsp;<span>★</span>&nbsp;❄&nbsp;<span>·</span>&nbsp;<span>☰</span>
</div>
</body></html>
