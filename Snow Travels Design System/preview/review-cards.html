<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;color:#fff}
  .wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:#080f09;border:0.5px solid rgba(255,255,255,0.08);border-radius:10px;padding:20px 22px}
  .stars{color:#f5c842;font-size:12px;letter-spacing:1px;margin-bottom:10px}
  .quote{font-family:var(--font-display);font-size:15px;font-weight:300;line-height:1.65;color:rgba(255,255,255,0.8);font-style:italic;margin-bottom:12px}
  .meta{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
  .author{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px}
  .guide{font-size:10px;color:#4ade80;letter-spacing:1px}
</style></head><body>
<div class="wrap">
  <div class="card">
    <div class="stars">★★★★★</div>
    <div class="quote">"He worked so hard to find a clearing in the clouds. We were the only group out so late."</div>
    <div class="meta"><span class="author">Group · Australia 🇦🇺</span></div>
  </div>
  <div class="card">
    <div class="stars">★★★★★</div>
    <div class="quote">"Our guide drove to Finland and on our way home we saw the dancing lights."</div>
    <div class="meta"><span class="author">Sudha · India 🇮🇳</span></div>
  </div>
</div>
</body></html>
