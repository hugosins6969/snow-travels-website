<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;color:#fff}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .ttab{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);padding:10px 20px;border-radius:30px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
  .ttab.active{background:#4ade80;border-color:#4ade80;color:#052010;font-weight:600}

  .qty-row{display:flex;justify-content:space-between;align-items:center;background:#080f09;border:0.5px solid rgba(255,255,255,0.08);border-radius:10px;padding:14px 16px;max-width:320px}
  .qty-label{font-size:13px;color:rgba(255,255,255,0.75);font-weight:500}
  .qty-ctrl{display:flex;align-items:center;gap:14px}
  .qty-btn{width:30px;height:30px;border-radius:6px;border:0.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.04);color:#fff;cursor:pointer;font-size:14px}
  .qty-num{font-size:15px;font-weight:600;color:#fff;min-width:22px;text-align:center}

  .h{font-size:11px;color:rgba(255,255,255,0.35);margin:18px 0 8px;letter-spacing:1px;text-transform:uppercase;font-weight:600}
</style></head><body>
<div class="h">Pill tabs</div>
<div class="tabs">
  <span class="ttab active">🌌 Minibus — 2,400 kr</span>
  <span class="ttab">🚌 Bus — 1,200 kr</span>
</div>
<div class="h">Quantity stepper</div>
<div class="qty-row">
  <span class="qty-label">Guests</span>
  <div class="qty-ctrl">
    <button class="qty-btn">−</button>
    <span class="qty-num">2</span>
    <button class="qty-btn">+</button>
  </div>
</div>
</body></html>
