<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;color:#fff}
  .row{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .btn-primary{background:#4ade80;color:#052010;padding:15px 32px;border-radius:8px;font-size:14px;font-weight:600;letter-spacing:0.2px;display:inline-flex;align-items:center;gap:8px;border:none;cursor:pointer}
  .btn-nav{background:#4ade80;color:#052010;padding:9px 22px;border-radius:7px;font-size:13px;font-weight:600;border:none;cursor:pointer}
  .btn-outline{background:transparent;color:rgba(255,255,255,0.8);border:0.5px solid rgba(255,255,255,0.2);padding:8px 16px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer}
  .btn-tour{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.12);color:#fff;border:0.5px solid rgba(255,255,255,0.25);padding:11px 24px;border-radius:7px;font-size:13px;font-weight:500;backdrop-filter:blur(4px);cursor:pointer}
  .btn-tour-green{background:rgba(74,222,128,0.15);border-color:rgba(74,222,128,0.35);color:#86efac}
  .btn-sec{color:rgba(255,255,255,0.7);font-size:14px;font-weight:400;border-bottom:1px solid rgba(255,255,255,0.2);padding-bottom:2px;display:inline-flex;align-items:center;gap:6px;background:none;border-top:none;border-left:none;border-right:none;cursor:pointer}
  .lang{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);border:0.5px solid rgba(255,255,255,0.15);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:500;cursor:pointer}
</style></head><body>
<div class="row">
  <button class="btn-primary">Book your tour →</button>
  <button class="btn-nav">Book now</button>
  <button class="btn-tour btn-tour-green">Book minibus →</button>
  <button class="btn-tour">Book bus tour →</button>
  <button class="btn-outline">Book →</button>
  <button class="btn-sec">Explore tours ↓</button>
  <button class="lang">中文</button>
</div>
</body></html>
