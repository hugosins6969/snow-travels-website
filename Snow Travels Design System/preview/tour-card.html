<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;color:#fff}
  .tour{background:#080f09;border:0.5px solid rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;max-width:320px}
  .img{height:140px;background:url('../assets/aurora-couple-green.jpg') center/cover;position:relative}
  .badge{position:absolute;top:12px;left:12px;background:#4ade80;color:#052010;font-size:9px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;padding:5px 10px;border-radius:20px}
  .body{padding:18px 20px}
  .name{font-family:var(--font-display);font-size:20px;font-weight:600;margin-bottom:6px;line-height:1.15}
  .desc{font-size:12px;color:rgba(255,255,255,0.5);line-height:1.6;margin-bottom:14px;font-weight:300}
  .foot{display:flex;justify-content:space-between;align-items:center}
  .price{font-size:14px;font-weight:600;color:#4ade80}
  .btn{background:transparent;color:rgba(255,255,255,0.8);border:0.5px solid rgba(255,255,255,0.2);padding:7px 14px;border-radius:6px;font-size:11px;font-weight:500}
</style></head><body>
<div class="tour">
  <div class="img"><span class="badge">Minibus · Max 15</span></div>
  <div class="body">
    <div class="name">Northern Lights Minibus</div>
    <div class="desc">The most personal aurora experience in Tromsø. 5–9 hours, no time cap.</div>
    <div class="foot">
      <span class="price">From 2,400 kr</span>
      <span class="btn">Book →</span>
    </div>
  </div>
</div>
</body></html>
