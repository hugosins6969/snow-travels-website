<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;color:#fff}
  .cal{background:#080f09;border:0.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:18px;max-width:360px}
  .hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .hdr-btn{background:rgba(255,255,255,0.06);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer}
  .month{font-size:14px;font-weight:600;letter-spacing:0.3px}
  .wd{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px}
  .wd div{text-align:center;font-size:9px;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;padding:3px 0}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .d{aspect-ratio:1/1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:rgba(255,255,255,0.75);background:rgba(255,255,255,0.03)}
  .d.past{color:rgba(255,255,255,0.15);background:transparent}
  .d.avail{background:rgba(74,222,128,0.08);color:#86efac}
  .d.few{background:rgba(251,191,36,0.1);color:#fcd34d}
  .d.full{background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.2)}
  .d.sel{background:#4ade80!important;color:#052010!important;font-weight:700}
</style></head><body>
<div class="cal">
  <div class="hdr"><button class="hdr-btn">‹</button><div class="month">November 2026</div><button class="hdr-btn">›</button></div>
  <div class="wd"><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div></div>
  <div class="grid" id="g"></div>
</div>
<script>
  const labels = [
    ['past',''],['past',''],['past',''],['past',''],['past',''],['past',''],['past',''],
    ['past','2'],['past','3'],['avail','4'],['avail','5'],['few','6'],['avail','7'],['avail','8'],
    ['avail','9'],['avail','10'],['avail','11'],['sel','12'],['avail','13'],['avail','14'],['full','15'],
    ['avail','16'],['few','17'],['avail','18'],['avail','19'],['avail','20'],['few','21'],['avail','22'],
    ['avail','23'],['avail','24'],['avail','25'],['full','26'],['avail','27'],['avail','28'],['avail','29'],
    ['avail','30']
  ];
  const g = document.getElementById('g');
  for (const [cls, txt] of labels) {
    const el = document.createElement('div');
    el.className = 'd ' + cls;
    el.textContent = txt;
    g.appendChild(el);
  }
</script>
</body></html>
