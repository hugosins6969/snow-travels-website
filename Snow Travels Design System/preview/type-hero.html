<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;color:var(--fg)}

<div class="meta">
  <span>Cormorant Garamond</span>
  <span>300 / 600</span>
  <span>64 px · tracking –1</span>
