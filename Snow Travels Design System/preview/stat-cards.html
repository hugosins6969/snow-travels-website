<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;color:#fff}
  .why-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden}
  .why-card{background:#080f09;padding:22px 20px}
  .why-num{font-family:var(--font-display);font-size:36px;font-weight:300;color:#4ade80;line-height:1;margin-bottom:10px}
  .why-t{font-size:13px;font-weight:500;color:#fff;margin-bottom:5px}
  .why-x{font-size:11px;color:rgba(255,255,255,0.4);line-height:1.6;font-weight:300}
</style></head><body>
<div class="why-grid">
  <div class="why-card">
    <div class="why-num">97.54%</div>
    <div class="why-t">Aurora success</div>
    <div class="why-x">Verified over 3 full seasons.</div>
  </div>
  <div class="why-card">
    <div class="why-num">5–9h</div>
    <div class="why-t">No time limits</div>
    <div class="why-x">We stay out as long as it takes.</div>
  </div>
  <div class="why-card">
    <div class="why-num">Free</div>
    <div class="why-t">Pro photos</div>
    <div class="why-x">High-res aurora shots sent next morning.</div>
  </div>
  <div class="why-card">
    <div class="why-num">Live</div>
    <div class="why-t">Sky cams</div>
    <div class="why-x">Real-time weather, all the way to Finland.</div>
  </div>
</div>
</body></html>
